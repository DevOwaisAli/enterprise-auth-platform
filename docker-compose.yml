name: enterprise-auth-platform

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: eap-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/enterprise_auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./test:/app/test
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.build.json:/app/tsconfig.build.json
      - ./nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    networks:
      - eap-network

  postgres:
    image: postgres:16-alpine
    container_name: eap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_auth
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d enterprise_auth']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eap-network

  redis:
    image: redis:7-alpine
    container_name: eap-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - eap-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  eap-network:
    driver: bridge
